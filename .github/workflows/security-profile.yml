name: Security Profile

on:
  workflow_dispatch:
  pull_request:
    paths:
      - security/**
      - runner/**
      - vm/**
      - object/**
      - docs/ANTITAMPER_PROBE.md
      - .github/workflows/security-profile.yml

jobs:
  targeted-security-tests:
    runs-on: ubuntu-latest
    env:
      MUTANT_TAMPER_RESPONSE: terminate
      MUTANT_TAMPER_DELAY_MS: "0"
      MUTANT_SECURITY_AUDIT: "1"
      MUTANT_SECURITY_TELEMETRY_FILE: "/tmp/mutant-security-telemetry.json"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run targeted security suites
        run: |
          go test ./security ./runner ./object ./code ./mutil ./generator ./cli -count=1
          go test ./vm -run TestVMIntegrityTamperResponseModes -count=1

      - name: Upload telemetry (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-telemetry
          path: /tmp/mutant-security-telemetry.json
          if-no-files-found: ignore

